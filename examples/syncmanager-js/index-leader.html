<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Sync Manager - Leader</title>
    </head>
    <body style="background-color: black">
        <video
            hwz="z-index: -1"
            id="one"
            style="
                position: absolute;
                top: 0px;
                left: 0px;
                height: 100%;
                width: 100%;
                object-fit: fill;
            "
            >
            <source src="test.mp4"/>
        </video>

        <script>
            // Create the sync manager with provided multicast settings
            const DOMAIN = "BrightSignDomain";
            const MCAST_ADDR = "224.0.126.10";
            const PORT = 1539;

            const SyncManagerClass = require("@brightsign/syncmanager");
            const sync = new SyncManagerClass("", DOMAIN, MCAST_ADDR, PORT);

            // Configure as leader
            sync.leader = true;
            sync.encrypted = false;
            console.log("Leader initialized. Starting synchronization...");

            // Track current sync ID to avoid reloading on every event
            let currentSyncId = null;
            sync.addEventListener("syncevent", function (e) {
                // console.log("Leader received sync event - domain:", e.domain, "id:", e.id, "timestamp:", e.iso_timestamp);
                // Only respond to new sync IDs (new sync sessions)
                if (e.id !== currentSyncId) {
                    currentSyncId = e.id;
                    const videoElement = document.getElementById("one");
                    videoElement.setSyncParams(e.domain, e.id, e.iso_timestamp);
                    videoElement.load();
                    videoElement.play();
                    console.log("Leader video synchronized to sync ID:", e.id);
                }
                // Subsequent events with the same ID are ignored
            });

            function startTimer() {
                setTimeout(function () {
                    restartLeader();
                }, 30000);
            }
            function restartLeader() {
                // Synchronize the videos to start playing in 1000ms
                // This creates a NEW sync session with a new ID
                sync.synchronize("sync_event_" + Date.now(), 1000);
                startTimer();
            }
            restartLeader();
        </script>
    </body>
</html>
